name: Build Android APK

# Triggers: on every push to main, every PR to main, and manual runs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # lets you click "Run workflow" in the Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Android SDK licenses
        # Explicit license acceptance — sometimes the action's auto-accept misses some.
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install Android SDK packages
        # API 36 platform is required (compileSdk = 36). For build-tools, 36.0.0
        # is bleeding-edge and sometimes unavailable — fall back to 35.0.0,
        # which is fully compatible with compileSdk 36.
        run: |
          set -e
          echo "==> Installing platforms;android-36"
          yes | sdkmanager "platforms;android-36"
          echo "==> Installing build-tools (try 36.0.0, fallback to 35.0.0)"
          yes | sdkmanager "build-tools;36.0.0" || \
            yes | sdkmanager "build-tools;35.0.0"
          echo "==> Installed packages:"
          sdkmanager --list_installed 2>/dev/null || sdkmanager --list 2>/dev/null | grep -E "Installed|installed"

      - name: Set up Gradle 9.1.0
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.1.0'

      - name: Generate Gradle wrapper
        # The repo is missing gradlew / gradle-wrapper.jar / gradle-wrapper.properties.
        # Generate them on the fly so we can use ./gradlew.
        run: gradle wrapper --gradle-version 9.1.0 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create .env file from secret
        # The secrets-gradle-plugin reads GEMINI_API_KEY from .env at build time.
        # If the GitHub secret GEMINI_API_KEY is set, use it. Otherwise fall back
        # to .env.example (which contains a placeholder) so the build still succeeds.
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
            echo "Using real GEMINI_API_KEY from GitHub secret"
          else
            cp .env.example .env
            echo "GEMINI_API_KEY secret not set — using placeholder from .env.example"
          fi

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: legal-recall-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Print APK location
        run: |
          echo "✅ APK built successfully"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
